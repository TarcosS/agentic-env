name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JSON valid
        run: find . -name '*.json' -not -path './.git/*' -print0 | xargs -0 -r -I{} python3 -m json.tool "{}" > /dev/null
      - name: Shell syntax
        run: find . -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -r -n1 bash -n
      - name: Python compiles
        run: find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 -r python3 -m py_compile
